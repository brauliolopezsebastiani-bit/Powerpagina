<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Especificaciones Técnicas | Power</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar"><a href="index.html" class="logo">POWER<span>.</span></a></nav>
    
    <div id="detalle-content" class="detail-container"></div>

    <script src="productos.js"></script>
    <script>
        const p = productos.find(i => i.id === parseInt(new URLSearchParams(window.location.search).get('id')));
        if(p) {
            document.getElementById('detalle-content').innerHTML = `
                <div class="detail-grid">
                    <div class="detail-image-box"><img src="${p.imagen}"></div>
                    <div class="detail-info-box">
                        <span class="badge-blue">${p.categoria}</span>
                        <h1>${p.nombre}</h1>
                        <p class="desc">${p.descripcion}</p>
                        <table class="spec-table">
                            ${Object.entries(p.specsFull).map(([k,v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('')}
                        </table>
                        <a href="https://wa.me/51999999999?text=Cotización: ${p.nombre}" class="btn-quote-full">SOLICITAR COTIZACIÓN INMEDIATA</a>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
